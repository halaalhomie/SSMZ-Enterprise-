version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-storeims}
      POSTGRES_USER: ${POSTGRES_USER:-storeims}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storeims}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storeims

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - storeims

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storeims}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storeims}
      DATABASE_URL_ASYNC: postgresql+asyncpg://${POSTGRES_USER:-storeims}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storeims}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: production
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_BUCKET_BACKUPS: ${S3_BUCKET_BACKUPS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - storeims

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storeims}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storeims}
      DATABASE_URL_ASYNC: postgresql+asyncpg://${POSTGRES_USER:-storeims}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storeims}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - backend
    networks:
      - storeims

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storeims}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storeims}
      DATABASE_URL_ASYNC: postgresql+asyncpg://${POSTGRES_USER:-storeims}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storeims}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - backend
    networks:
      - storeims

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - storeims

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - storeims

volumes:
  postgres_data:
  redis_data:

networks:
  storeims:
    driver: bridge
